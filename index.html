<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成都好好吃</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ========== HEADER ========== -->
<div class="header">
  <h1>成都好好吃</h1>
  <p>99+ 家地道美食 · 今日吃啥不纠结</p>
</div>

<!-- ========== PAGE: HOME ========== -->
<div id="page-home" class="page active"></div>

<!-- ========== PAGE: MAP ========== -->
<div id="page-map" class="page">
  <div id="map"></div>
  <p class="map-info">👆 点击标记查看店铺详情</p>
  <div class="cat-bar" id="map-cat-bar"></div>
</div>

<!-- ========== PAGE: SEARCH ========== -->
<div id="page-search" class="page">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="搜店名、推荐菜、地址…" autocomplete="off">
  </div>
  <div class="cat-bar" id="search-cat-bar"></div>
  <div id="search-results" class="shop-list"></div>
</div>

<!-- ========== PAGE: DIARY ========== -->
<div id="page-diary" class="page">
  <div class="section-title">
    <span>📝 美食日记</span>
    <span id="diary-count" style="font-size:12px;color:var(--gray)">0 篇</span>
  </div>

  <!-- Diary Form -->
  <details style="margin-bottom:16px;background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border)">
    <summary style="font-size:15px;font-weight:600;cursor:pointer;color:var(--red)">✏️ 写新日记</summary>
    <form id="diary-form" class="diary-form" style="margin-top:12px">
      <div class="form-row">
        <div>
          <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">日期</label>
          <input type="date" id="diary-date">
        </div>
        <div style="position:relative">
          <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">店铺名 *</label>
          <input type="text" id="diary-shop" placeholder="输入店铺名" list="shop-list" autocomplete="off">
          <div id="diary-shop-suggestions" style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:10;max-height:200px;overflow-y:auto;display:none"></div>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">点评 *</label>
        <textarea id="diary-text" placeholder="今天吃得怎么样？"></textarea>
      </div>
      <div class="form-row">
        <div>
          <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">评分</label>
          <select id="diary-rating">
            <option value="">不评</option>
            <option value="1">⭐</option>
            <option value="2">⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">花费</label>
          <input type="text" id="diary-cost" placeholder="¥ 金额" inputmode="decimal">
        </div>
        <div>
          <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">推荐？</label>
          <select id="diary-recommend">
            <option value="">—</option>
            <option value="yes">✅ 推荐</option>
            <option value="no">❌ 不推荐</option>
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px">照片</label>
        <input type="file" id="diary-image-input" accept="image/*" style="font-size:13px">
        <div id="diary-image-preview"></div>
      </div>
      <button type="submit" class="btn-submit">💾 保存日记</button>
    </form>
  </details>

  <!-- Diary Entries -->
  <div id="diary-entries"></div>
</div>

<!-- ========== FAB: Add Shop ========== -->
<button class="float-btn" id="fab-add-shop" onclick="openAddShopForm()" title="新增店铺">+</button>

<!-- ========== SHOP DETAIL OVERLAY ========== -->
<div class="overlay" id="detail-overlay">
  <div class="overlay-content" id="detail-content">
    <button class="overlay-close" onclick="closeDetail()">✕</button>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ========== ADD SHOP OVERLAY ========== -->
<div class="overlay" id="addshop-overlay">
  <div class="overlay-content" style="max-height:85vh">
    <button class="overlay-close" onclick="closeAddShopForm()">✕</button>
    <h2 style="margin-bottom:4px">➕ 新增店铺</h2>
    <p style="font-size:13px;color:var(--gray);margin-bottom:12px">数据保存在本地浏览器</p>
    <form id="addshop-form" class="add-shop-form">
      <div>
        <label>店名 *</label>
        <input type="text" id="addshop-name" placeholder="如：张三姐老火锅" required>
      </div>
      <div class="form-row">
        <div>
          <label>分类 *</label>
          <select id="addshop-cat" required>
            <option value="">选择分类</option>
          </select>
        </div>
        <div>
          <label>评分</label>
          <select id="addshop-rating">
            <option value="">无</option><option value="1">⭐</option><option value="2">⭐⭐</option>
            <option value="3">⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="5">⭐⭐⭐⭐⭐</option>
          </select>
        </div>
      </div>
      <div>
        <label>推荐菜 *</label>
        <input type="text" id="addshop-rec" placeholder="如：嫩牛肉、毛肚、鸭肠" required>
      </div>
      <div>
        <label>地址 *</label>
        <input type="text" id="addshop-addr" placeholder="如：春熙路" required>
      </div>
      <div class="form-row">
        <div>
          <label>纬度 (选填)</label>
          <input type="number" id="addshop-lat" step="0.0001" placeholder="30.66" inputmode="decimal">
        </div>
        <div>
          <label>经度 (选填)</label>
          <input type="number" id="addshop-lng" step="0.0001" placeholder="104.06" inputmode="decimal">
        </div>
      </div>
      <div>
        <label>标签 (逗号分隔)</label>
        <input type="text" id="addshop-tags" placeholder="如：老店、实惠、排队王">
      </div>
      <div>
        <label>备注</label>
        <textarea id="addshop-note" placeholder="随便写点什么…"></textarea>
      </div>
      <button type="submit" class="btn-submit">✅ 添加店铺</button>
    </form>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>

<!-- ========== TAB BAR ========== -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('home')">
    <span class="icon">🎯</span>
    <span class="label">推荐</span>
  </button>
  <button class="tab-btn" onclick="switchTab('map')">
    <span class="icon">🗺️</span>
    <span class="label">地图</span>
  </button>
  <button class="tab-btn" onclick="switchTab('search')">
    <span class="icon">🔍</span>
    <span class="label">搜索</span>
  </button>
  <button class="tab-btn" onclick="switchTab('diary')">
    <span class="icon">📝</span>
    <span class="label">日记</span>
  </button>
</div>

<!-- ========== SCRIPTS (order matters) ========== -->
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/map.js"></script>
<script src="js/diary.js"></script>
<script src="js/app.js"></script>
</body>
</html>
