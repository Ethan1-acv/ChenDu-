<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
:root{--red:#dc2626;--orange:#ea580c;--yellow:#f59e0b;--bg:#faf5ef;--card:#fff;--text:#1a1a1a;--gray:#6b7280;--border:#f0e8dd}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding-bottom:70px}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--border);z-index:999;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.tab-btn{flex:1;padding:8px 0 10px;text-align:center;font-size:12px;color:var(--gray);border:none;background:none;cursor:pointer;transition:.2s}
.tab-btn.active{color:var(--red);font-weight:600}
.tab-btn .icon{font-size:22px;display:block;margin-bottom:2px}
.tab-btn .label{font-size:11px}

/* Pages */
.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}

/* Header */
.header{padding:16px 16px 8px;max-width:600px;margin:0 auto}
.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:13px;color:var(--gray);margin-top:2px}

/* Today's Card */
.today-card{background:linear-gradient(135deg,#dc2626,#ea580c);border-radius:16px;padding:24px;color:white;margin:12px 0;position:relative;overflow:hidden}
.today-card::before{content:'🍜';position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.15}
.today-badge{font-size:12px;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px}
.today-card h2{font-size:22px;margin-bottom:4px}
.today-card .rec-dish{font-size:15px;opacity:.9;margin:8px 0}
.today-card .addr{font-size:13px;opacity:.7}
.today-card .tags{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.today-card .tag{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-size:11px}
.today-actions{display:flex;gap:10px;margin-top:16px}
.today-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.btn-shuffle{background:rgba(255,255,255,.25);color:white}
.btn-map{background:white;color:var(--red)}

/* Category Filter */
.cat-bar{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:8px;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;transition:.2s;flex-shrink:0}
.cat-btn.active{background:var(--red);color:white;border-color:var(--red)}
.cat-btn.all{background:var(--yellow);color:white;border-color:var(--yellow)}

/* Shop List */
.shop-list{display:flex;flex-direction:column;gap:10px}
.shop-item{background:var(--card);border-radius:12px;padding:14px 16px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.shop-item:active{transform:scale(.98)}
.shop-item h3{font-size:16px;font-weight:600}
.shop-item .rec{margin-top:4px;font-size:13px;color:var(--orange)}
.shop-item .meta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--gray)}

/* Search */
.search-box{display:flex;gap:10px;margin:12px 0}
.search-box input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid var(--border);font-size:15px;background:var(--card);outline:none}
.search-box input:focus{border-color:var(--red)}

/* Map */
#map{width:100%;height:60vh;border-radius:12px;margin:12px 0;overflow:hidden}
.map-info{text-align:center;font-size:13px;color:var(--gray);margin:8px 0}

/* Shop Detail Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;animation:fadeIn .2s}
.overlay.show{display:block}
.overlay-content{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:24px;max-height:70vh;overflow-y:auto;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay-close{float:right;font-size:24px;cursor:pointer;color:var(--gray)}
.overlay h2{font-size:22px;margin-bottom:4px}
.overlay .rec-dish{color:var(--orange);font-size:15px;margin:8px 0}
.overlay .addr{margin-top:4px;font-size:14px;color:var(--gray)}
.overlay .tags{margin:12px 0;display:flex;gap:6px;flex-wrap:wrap}
.overlay .tag{background:var(--bg);padding:4px 12px;border-radius:12px;font-size:12px}
.overlay .nav-btn{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:12px 20px;background:var(--red);color:white;border:none;border-radius:12px;font-size:15px;cursor:pointer;text-decoration:none}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--gray)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Number badge */
.num-badge{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;background:var(--bg);border-radius:50%;font-size:11px;color:var(--gray);margin-right:6px;vertical-align:middle;flex-shrink:0}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:white;padding:16px 24px;border-radius:12px;font-size:14px;z-index:2000;display:none;animation:fadeIn .2s;text-align:center;max-width:80vw}
</style>
</head>

<div class="header">

<!-- ============ PAGE: HOME ============ -->
<div id="page-home" class="page active"></div>

<div id="page-map" class="page">

<!-- ============ PAGE: SEARCH ============ -->
<div id="page-search" class="page">

<!-- ============ DETAIL OVERLAY ============ -->
<div class="overlay" id="detail-overlay">

    <div id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ============ TAB BAR ============ -->
<div class="tab-bar">

  </button>
  <button class="tab-btn" onclick="switchTab('map')">

  <button class="tab-btn" onclick="switchTab('search')">

  </button>
</div>

// ================== STATE ==================
let map = null, markers = [], mapInitialized = false;
let currentTab = 'home';
let todayId = null;
let recommendHistory = [];

function getDaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function getTimeContext() {
  const h = new Date().getHours();
  const month = new Date().getMonth() + 1;
  return { hour: h, isSummer: month >= 5 && month <= 9, isWinter: month <= 2 || month >= 11, isWeekend: [0,6].includes(new Date().getDay()) };
}

function scoreForToday(shop) {
  const ctx = getTimeContext();
  let score = 0;
  const seed = (getDaySeed() * 997 + shop.id * 7919) % 100;
  score += seed / 100;
  if (recommendHistory.includes(shop.id)) score -= 0.5;
  if (ctx.isSummer && ['冰粉','甜品','钵钵鸡'].includes(shop.cat)) score += 0.3;
  if (ctx.isWinter && ['火锅','蹄花','肥肠'].includes(shop.cat)) score += 0.3;
  if (ctx.isWeekend && ['火锅','串串','川菜'].includes(shop.cat)) score += 0.2;
  if (ctx.hour >= 20 && ['烧烤','串串'].includes(shop.cat)) score += 0.2;
  if (ctx.hour >= 6 && ctx.hour <= 13 && ['面食','粉面','抄手','锅盔'].includes(shop.cat)) score += 0.2;
  return score;
}

function getTodaysPick() {
  if (todayId) {
    const s = SHOPS.find(x => x.id === todayId);
    if (s) return s;
  }
  const scored = SHOPS.map(s => ({ ...s, _score: scoreForToday(s) })).sort((a,b) => b._score - a._score);
  const pick = scored[0];
  todayId = pick.id;
  recommendHistory.push(pick.id);
  if (recommendHistory.length > 30) recommendHistory.shift();
  return pick;
}

function refreshToday() {
  const pick = getTodaysPick();
  const idx = SHOPS.indexOf(pick) + 1;
  document.getElementById('page-home').innerHTML = `
    <div class="today-card">
      <div class="today-badge">🎯 今日推荐  #${idx}/99</div>
      <h2>${pick.name}</h2>
      <div class="rec-dish">推荐：${pick.rec}</div>
      <div class="addr">📍 ${pick.addr}</div>
      <div class="tags">${pick.tags.map(t => '<span class="tag">'+t+'</span>').join('')}</div>
      <div style="margin-top:8px;font-size:12px;opacity:.6">分类：${pick.cat}</div>
    </div>
    <div class="today-actions">
      <button class="btn-shuffle" onclick="shuffleToday()">🔄 换个推荐</button>
      <button class="btn-map" onclick="goToMapDetail(${pick.id})">🗺️ 看地图</button>
    </div>
    <div style="margin-top:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="font-size:16px">探索更多</h3>
        <span style="font-size:12px;color:var(--gray)">共 ${SHOPS.length} 家</span>
      </div>
      <div class="cat-bar" id="home-cat-bar"></div>
      <div class="shop-list" id="home-shop-list"></div>
    </div>
  `;
  renderCats('home-cat-bar', 'home', '全部');
  renderShopList('home-shop-list', SHOPS);
}

function shuffleToday() {
  todayId = null;
  refreshToday();
}

// ================== CATEGORY FILTER ==================
function renderCats(containerId, context, activeCat) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = CATEGORIES.map(c =>
    '<button class="cat-btn ' + (c === activeCat ? 'active' : '') + ' ' + (c === '全部' ? 'all' : '') + '" onclick="filterByCat(\''+c+'\',\''+context+'\')">'+c+'</button>'
  ).join('');
}

function filterByCat(cat, context) {
  document.querySelectorAll('#'+context+'-cat-bar .cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  if (context === 'map') { filterMapByCat(cat); return; }
  const filtered = cat === '全部' ? SHOPS : SHOPS.filter(s => s.cat === cat);
  renderShopList(context+'-shop-list', filtered);
}

function renderShopList(containerId, shops) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!shops.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>没找到匹配的店铺</p></div>';
    return;
  }
  el.innerHTML = shops.map(s =>
    '<div class="shop-item" onclick="showDetail('+s.id+')">' +
      '<h3><span class="num-badge">'+s.id+'</span>'+s.name+'</h3>' +
      '<div class="rec">🔥 '+s.rec+'</div>' +
      '<div class="meta"><span>📍 '+s.addr+'</span><span>🏷️ '+s.cat+'</span></div>' +
    '</div>'
  ).join('');
}

// ================== DETAIL OVERLAY ==================
function showDetail(id) {
  const s = SHOPS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('detail-body').innerHTML =
    '<h2>'+s.name+'</h2>' +
    '<div style="font-size:13px;color:var(--gray);margin-bottom:8px">#'+s.id+' / 99</div>' +
    '<div class="rec-dish">🔥 推荐：'+s.rec+'</div>' +
    '<div class="addr">📍 '+s.addr+'</div>' +
    '<div class="tags">'+s.tags.map(t => '<span class="tag">'+t+'</span>').join('')+'</div>' +
    '<div style="margin-top:8px;font-size:13px;color:var(--gray)">分类：'+s.cat+'</div>' +
    '<a class="nav-btn" href="https://uri.amap.com/marker?position='+s.lng+','+s.lat+'&name='+encodeURIComponent(s.name)+'" target="_blank">🗺️ 高德地图导航</a>';
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
}

// ================== TAB SWITCHING ==================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[['home','map','search'].indexOf(tab)].classList.add('active');
  if (tab === 'home') refreshToday();
  if (tab === 'map') initMap();
  if (tab === 'search') {
    renderCats('search-cat-bar', 'search', '全部');
    renderShopList('search-results', SHOPS);
    document.getElementById('search-input').value = '';
  }
}

// ================== MAP ==================
function initMap() {
  if (mapInitialized) return;
  mapInitialized = true;
  map = L.map('map', { center: [30.66, 104.06], zoom: 12, zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 18 }).addTo(map);
  SHOPS.forEach(s => {
    const marker = L.marker([s.lat, s.lng])
      .bindPopup('<b>'+s.name+'</b><br>🔥 '+s.rec+'<br>📍 '+s.addr)
      .on('click', () => showDetail(s.id));
    marker.addTo(map);
    markers.push(marker);
  });
  renderCats('map-cat-bar', 'map', '全部');
}

function goToMapDetail(id) {
  const s = SHOPS.find(x => x.id === id);
  if (!s) return;
  switchTab('map');
  setTimeout(() => {
    map.setView([s.lat, s.lng], 16);
    markers[s.id-1].openPopup();
  }, 300);
}

function filterMapByCat(cat) {
  document.querySelectorAll('#map-cat-bar .cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  SHOPS.forEach((s, i) => {
    if (cat === '全部' || s.cat === cat) markers[i].addTo(map);
    else map.removeLayer(markers[i]);
  });
  if (cat === '全部') map.setView([30.66, 104.06], 12);
}

// ================== SEARCH ==================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('search-input').addEventListener('input', function() {
    clearTimeout(this._timer);
    this._timer = setTimeout(() => performSearch(this.value.trim()), 200);
  });
});

function performSearch(q) {
  let results;
  if (!q) { results = SHOPS; }
  else {
    results = SHOPS.filter(s =>
      s.name.includes(q) || s.rec.includes(q) || s.addr.includes(q) || s.cat.includes(q) ||
      s.tags.some(t => t.includes(q))
    );
  }
  renderShopList('search-results', results);
}

// ================== INIT ==================
refreshToday();
</script>
